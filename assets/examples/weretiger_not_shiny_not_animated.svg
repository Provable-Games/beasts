<!-- Annotated version of the CURRENT design (structure unchanged; added comments only) -->
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="250" height="350" viewBox="0 0 250 350">
  <!-- Subtle SMIL animation to force repaints / shimmer (not needed for print; browser-only) -->
  <animate attributeName='opacity' dur='2.2s' from='1' to='0.999' repeatCount='indefinite' />
  <defs>
    <!-- Metallic gold gradient used for the inner frame stroke -->
    <linearGradient id='gold' x1='0%' y1='0%' x2='100%' y2='100%'>
      <stop offset='0%' stop-color='#e5d8b2' />
      <stop offset='60%' stop-color='#b79a5e' />
      <stop offset='100%' stop-color='#8a6d3b' />
    </linearGradient>
    <!-- Dark panel gradient for stat/info boxes -->
    <linearGradient id='panel' x1='0%' y1='0%' x2='0%' y2='100%'>
      <stop offset='0%' stop-color='#2d2d32' />
      <stop offset='100%' stop-color='#1e1e22' />
    </linearGradient>
    <!-- Shiny RIM (pastel blend 0.45) -->
    <linearGradient id="shinyRim" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="250" y2="0" spreadMethod="repeat">
      <stop offset="0%" stop-color="#73FF73" />
      <!-- green -->
      <stop offset="16.67%" stop-color="#FFFF73" />
      <!-- yellow -->
      <stop offset="33.33%" stop-color="#FFBE73" />
      <!-- orange -->
      <stop offset="50%" stop-color="#FF7373" />
      <!-- red -->
      <stop offset="66.67%" stop-color="#C073DC" />
      <!-- purple -->
      <stop offset="83.33%" stop-color="#7373FF" />
      <!-- blue -->
      <stop offset="100%" stop-color="#73FF73" />
      <!-- wrap to green -->
      <!-- Spin the gradient around the card center (125,175) -->
      <animateTransform attributeName="gradientTransform" type="rotate" from="0 125 175" to="360 125 175" dur="6s" repeatCount="indefinite" />
    </linearGradient>
    <linearGradient id="logo_pastel_rainbow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#73FF73" />
      <stop offset="20%" stop-color="#FFFF73" />
      <stop offset="40%" stop-color="#FFBE73" />
      <stop offset="60%" stop-color="#FF7373" />
      <stop offset="80%" stop-color="#C073DC" />
      <stop offset="100%" stop-color="#7373FF" />
    </linearGradient>
    <!-- Radial highlight (not used in current layout) -->
    <radialGradient id='sparkle' cx='50%' cy='50%' r='50%'>
      <stop offset='0%' stop-color='#ffffff' stop-opacity='0.8' />
      <stop offset='70%' stop-color='#ffffff' stop-opacity='0.3' />
      <stop offset='100%' stop-color='#ffffff' stop-opacity='0' />
    </radialGradient>
    <!-- Icon symbols used in stat boxes -->
    <path transform='scale(0.7)' d='M13 11c0-6 9-6 9 0s-9 10.5-9 10.5S4 17 4 11s9-6 9 0Z' stroke-width='3' id='heart' stroke='#ff6b6b' fill='none' />
    <path transform='scale(0.95)' id='bolt' stroke='#ffd166' stroke-width='2' stroke-linejoin='round' d='M6 2 2 9h5l-4 7' />
    <!-- Crown icon (defined but not referenced) -->
    <g id='crown' fill='#e6c56e' stroke='#af8a3c' stroke-width='1'>
      <path d='M2 14h16l-1.5 4h-13z' />
      <path d='m3 14 2-9 3 5 4-5 3 5 2-5 2 9Z' stroke-linejoin='round' stroke-linecap='round' />
      <circle cx='5' cy='5' r='1.2' fill='#fff3c4' />
      <circle cx='12' cy='5' r='1.2' fill='#fff3c4' />
      <circle cx='17' cy='5' r='1.2' fill='#fff3c4' />
    </g>
    <!-- Trophy icon used near the title -->
    <g id='trophy' fill='#c0c0c0' stroke='#8a8a8a' stroke-width='1'>
      <rect x='4' y='6' width='10' height='8' rx='1' />
      <rect x='2' y='7' width='2' height='3' />
      <rect x='14' y='7' width='2' height='3' />
      <rect x='6' y='13' width='6' height='4' />
    </g>
    <!-- Dark pinstripe background pattern for the card face -->
    <pattern id='pin' width='12' height='12' patternUnits='userSpaceOnUse' patternTransform='rotate(12)'>
      <path fill='#1b1b1f' d='M0 0h12v12H0z' />
      <path fill='#242428' opacity='.3' d='M0 0h12v6H0z' />
    </pattern>
    <!-- Typographic styles for labels and values; global font set to monospace -->
    <style>
      .label {
        fill: #c9c9d1;
        font-size: 10px;
        letter-spacing: .4px
      }

      .valL {
        fill: #fff;
        font-size: 15px;
        font-weight: 700
      }

      text {
        font-family: Courier, monospace;
      }
    </style>
  </defs>
  <!-- Base background -->
  <rect width='250' height='350' rx='12' fill='url(#pin)' />
  <!-- Pulsing Logo -->
  <g transform='translate(15, 15)'>
    <g id='logoPulse' transform='scale(0.029)'>
      <path fill-rule='evenodd' clip-rule='evenodd' d='M242.9 629.232H69.4V349.536H0V699.071H242.9V629.232ZM312.3 69.9071V0H34.7V69.9071H0V314.582H104.1V384.489H242.9V314.582H347V69.9071H312.3ZM277.6 244.675H208.2V314.582H138.8V244.675H69.4V139.814H138.8V244.675H208.2V139.814H277.6V244.675ZM104.1 594.279H277.6V734.093H0V804H312.3V734.093H347V524.372H173.5V489.418H347V419.511H104.1V594.279Z' fill='#0000ff' />
      <animate attributeName='opacity' values='0.6;1;0.6' dur='3s' repeatCount='indefinite' />
    </g>
  </g>
  <!-- Trophy badge and cost number -->
  <use href='#trophy' x='218' y='9' width='20' height='20' />
  <text x='227' y='39' text-anchor='middle' style='fill:#b0b0b6;font-size:11px;font-weight:700'>4</text>
  <!-- Subtitle and title -->
  <text x='125' y='29' text-anchor='middle' style='fill:#fff;font-size:12px;'>"Honour Sun"</text>
  <text x='125' y='49' text-anchor='middle' style='fill:#fff;font-size:21px;font-weight:700;letter-spacing:.7px'>Weretiger</text>
  <!-- Artwork clipping path (square 144x144; note: below art frame uses width 220, so sizes differ) -->
  <clipPath id='artClip'>
    <rect width='144' height='144' rx='8' />
  </clipPath>
  <!-- Artwork background area / frame -->
  <rect x='15' y='58' width='220' height='144' rx='8' fill='#00' />
  <!-- Artwork image placed and clipped; pixelated for retro style -->
  <g transform='translate(61, 65)' clip-path='url(#artClip)'>
    <image x='1' y='1' width='128' height='128' style='image-rendering:pixelated; image-rendering:-moz-crisp-edges; -ms-interpolation-mode:nearest-neighbor;' href='data:image/gif;base64,' />
  </g>
  <!-- Art frame stroke -->
  <rect x='15' y='58' width='220' height='144' rx='8' fill='none' stroke='#fff' stroke-opacity='.08' stroke-width='2' />
  <!-- Row of three small info panels: TIER, LEVEL, TYPE -->
  <g transform='translate(15 210)'>
    <rect width='70' height='50' rx='5' fill='url(#panel)' />
    <text x='35' y='18' text-anchor='middle' class='label'>TIER</text>
    <text x='35' y='38' text-anchor='middle' class='valL'>3</text>
    <g transform='translate(75)'>
      <rect width='70' height='50' rx='5' fill='url(#panel)' />
      <text x='35' y='18' text-anchor='middle' class='label'>LEVEL</text>
      <text x='35' y='38' text-anchor='middle' class='valL'>17</text>
    </g>
    <g transform='translate(150)'>
      <rect width='70' height='50' rx='5' fill='url(#panel)' />
      <text x='35' y='18' text-anchor='middle' class='label'>TYPE</text>
      <text x='35' y='37' text-anchor='middle' style='fill:#fff;font-size:13px;font-weight:700'>Hunter</text>
    </g>
  </g>
  <!-- Bottom row: POWER and HEALTH panels with icons -->
  <g transform="translate(15 265)">
    <rect width="107" height="65" rx="5" fill="url(#panel)"></rect>
    <text x="18" y="22" class="label">POWER</text>
    <text x="18" y="46" style="fill:#fff;font-size:20px;font-weight:700">4</text>
    <g transform="translate(82,30) scale(1)">
      <use href="#bolt" xlink:href="#bolt" pointer-events="none" />
    </g>
  </g>
  <g transform="translate(128 265)">
    <rect width="107" height="65" rx="5" fill="url(#panel)"></rect>
    <text x="18" y="22" class="label">HEALTH</text>
    <text x="18" y="46" style="fill:#fff;font-size:19px;font-weight:700">100</text>
    <g transform="translate(82,30) scale(0.75)">
      <use href="#heart" xlink:href="#heart" pointer-events="none" />
    </g>
  </g>
  <!-- Outer animated rainbow border -->
  <rect x="4.5" y="4.5" width="241" height="341" rx="9" fill="none" stroke="url(#gold)" stroke-width="4"/>
  <!-- Outer regular gold border -->
  <!-- <rect x='4.5' y='4.5' width='241' height='341' rx='9' fill='none' stroke='url(#gold)' stroke-width='4' /> -->
</svg>